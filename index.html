<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ICU Board">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>لوحة المرضى</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{\n  --cr:#e53e3e;--cr-bg:#fff5f5;--cr-bd:#feb2b2;\n  --wa:#d69e2e;--wa-bg:#fffff0;--wa-bd:#f6e05e;\n  --st:#38a169;--st-bg:#f0fff4;--st-bd:#9ae6b4;\n  --nw:#805ad5;--nw-bg:#faf5ff;--nw-bd:#d6bcfa;\n  --text:#1a202c;--muted:#718096;--border:#e2e8f0;\n  --bg:#f7f8fa;--card:#fff;\n  --safe-top:env(safe-area-inset-top,0px);\n  --safe-bot:env(safe-area-inset-bottom,0px);\n}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);direction:rtl;display:flex;flex-direction:column;}
.login{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;padding:28px 24px;}
.login-logo{width:64px;height:64px;background:#1a202c;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:20px;}
.login-title{font-size:22px;font-weight:800;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:32px;}
.lcard{width:100%;max-width:340px;}
.lbl{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;display:block;letter-spacing:.5px;}
.linput{width:100%;padding:12px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;font-family:'Tajawal',sans-serif;font-size:15px;color:var(--text);direction:rtl;outline:none;margin-bottom:14px;transition:border .2s;}
.linput:focus{border-color:#1a202c;background:#fff;}
.lbtn{width:100%;padding:14px;background:#1a202c;color:#fff;border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:16px;font-weight:700;cursor:pointer;}
.lbtn:active{opacity:.85;}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:calc(var(--safe-top)+10px) 16px 0;flex-shrink:0;}
.trow{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.app-title{font-size:17px;font-weight:800;}
.tright{display:flex;align-items:center;gap:10px;}
.clock{font-size:11px;color:var(--muted);line-height:1.5;text-align:left;}
.upill{display:flex;align-items:center;gap:5px;background:var(--bg);border-radius:20px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border);}
.ward-tabs{display:flex;overflow-x:auto;scrollbar-width:none;gap:4px;}
.ward-tabs::-webkit-scrollbar{display:none;}
.wtab{font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;padding:9px 14px;background:none;border:none;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2.5px solid transparent;flex-shrink:0;display:flex;align-items:center;gap:5px;transition:all .15s;}
.wtab.active{color:var(--text);border-bottom-color:#1a202c;}
.wcount{font-size:10px;font-weight:800;padding:1px 6px;border-radius:20px;background:var(--bg);color:var(--muted);}
.wtab.active .wcount{background:#1a202c;color:#fff;}
.wtab-add{padding:9px 12px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;flex-shrink:0;}
.stats-row{display:flex;gap:8px;padding:10px 16px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.stats-row::-webkit-scrollbar{display:none;}
.scard{display:flex;flex-direction:column;align-items:center;background:var(--bg);border-radius:10px;padding:7px 14px;flex-shrink:0;min-width:58px;border:1px solid var(--border);}
.snum{font-size:20px;font-weight:800;line-height:1;}
.slbl{font-size:10px;font-weight:600;color:var(--muted);margin-top:2px;}
.scard.cr .snum{color:var(--cr);}
.scard.wa .snum{color:var(--wa);}
.scard.st .snum{color:var(--st);}
.scard.nw .snum{color:var(--nw);}
.search-wrap{padding:10px 16px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;}
.sbox{display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:8px 14px;}
.sbox input{flex:1;border:none;background:none;outline:none;font-family:'Tajawal',sans-serif;font-size:14px;color:var(--text);direction:rtl;}
.scroll{flex:1;overflow-y:auto;padding:12px 16px calc(var(--safe-bot)+80px);}
.scroll::-webkit-scrollbar{width:3px;}
.scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.ward-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.wname{font-size:18px;font-weight:800;}
.wsub{font-size:12px;color:var(--muted);margin-top:2px;}
.hdr-btns{display:flex;gap:6px;}
.wedit{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:7px 12px;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:4px;}
.wedit.share-btn{background:#ebf8ff;color:#2b6cb0;border-color:#bee3f8;}
.pcard{background:#fff;border-radius:16px;border:1px solid var(--border);margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);position:relative;}
.pcard.critical{border-right:4px solid var(--cr);}
.pcard.watch{border-right:4px solid var(--wa);}
.pcard.stable{border-right:4px solid var(--st);}
.pcard.new-patient{border-right:4px solid var(--nw);}
.pcard.archived-card{border-right:4px solid var(--muted);opacity:0.9;}
.ph{display:flex;align-items:flex-start;justify-content:space-between;padding:12px 14px 6px;}
.pname{font-size:15px;font-weight:800;}
.pmeta{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.6;}
.sbadge{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;flex-shrink:0;display:flex;align-items:center;gap:4px;}
.sbadge.critical{background:var(--cr-bg);color:var(--cr);}
.sbadge.watch{background:var(--wa-bg);color:var(--wa);}
.sbadge.stable{background:var(--st-bg);color:var(--st);}
.sbadge.new-patient{background:var(--nw-bg);color:var(--nw);}
.pb{padding:0 14px 10px;}
.pdiag{font-size:13px;font-weight:700;background:var(--bg);border-radius:8px;padding:7px 10px;margin-bottom:8px;}
.ptags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.ptag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;background:var(--bg);color:var(--muted);border:1px solid var(--border);}
.ptag.device-tag{background:#fffaf0;color:#dd6b20;border-color:#fbd38d;font-weight:700;}
.ptag.alert-tag{background:#fff5f5;color:#c53030;border-color:#feb2b2;font-weight:700;animation:pulse 2s infinite;}
.psec{font-size:10px;font-weight:800;color:var(--muted);margin:8px 0 4px;letter-spacing:.5px;text-transform:uppercase;}
.plist{list-style:none;}
.plist li{font-size:13px;padding:4px 0;display:flex;align-items:flex-start;gap:7px;border-bottom:1px solid #f7f8fa;}
.plist li:last-child{border:none;}
.plist.sym li::before{content:'●';font-size:7px;color:var(--cr);margin-top:5px;flex-shrink:0;}
.plist.rec li::before{content:'→';color:#3182ce;flex-shrink:0;}
.pfoot{display:flex;gap:6px;padding:8px 14px 10px;border-top:1px solid var(--bg);flex-wrap:wrap;}
.pact{font-family:'Tajawal',sans-serif;font-size:12px;font-weight:700;padding:6px 12px;border-radius:9px;border:1.5px solid var(--border);background:#fff;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:4px;}
.pact:active{transform:scale(.95);}
.pact.bl{color:#3182ce;border-color:#bee3f8;}
.pact.gr{color:var(--st);border-color:var(--st-bd);}
.fab{position:fixed;bottom:calc(var(--safe-bot)+16px);left:16px;background:#1a202c;color:#fff;border:none;border-radius:50px;padding:14px 22px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.18);z-index:100;display:flex;align-items:center;gap:8px;}
.fab:active{transform:scale(.96);}
.empty{text-align:center;padding:48px 20px;color:var(--muted);}
.ei{font-size:44px;margin-bottom:12px;}
.empty p{font-size:14px;font-weight:500;}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:#1a202c;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
.audit-item{background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:8px;border:1px solid var(--border);}
.at{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.auser{font-size:13px;font-weight:800;}
.atime{font-size:11px;color:var(--muted);}
.atag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;background:var(--bg);color:var(--muted);border:1px solid var(--border);margin-bottom:5px;}
.adet{font-size:13px;line-height:1.5;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding:22px 18px calc(var(--safe-bot)+28px);transform:translateY(40px);transition:transform .22s;}
.overlay.open .modal{transform:translateY(0);}
.modal::-webkit-scrollbar{display:none;}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.mt{font-size:16px;font-weight:800;}
.mc{background:var(--bg);border:1px solid var(--border);border-radius:50%;width:30px;height:30px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);}
.fg{margin-bottom:12px;}
.fl{font-size:11px;font-weight:800;color:var(--muted);margin-bottom:5px;display:block;letter-spacing:.3px;}
.fi,.fsel,.fta{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:11px;font-family:'Tajawal',sans-serif;font-size:14px;direction:rtl;outline:none;background:var(--bg);color:var(--text);transition:border .2s;}
.fi:focus,.fsel:focus,.fta:focus{border-color:#1a202c;background:#fff;}
.fta{resize:vertical;min-height:72px;}
.sbtn{width:100%;padding:13px;background:#1a202c;color:#fff;border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;}
.sbtn.red{background:var(--cr);}
.sbtn.blue{background:#3182ce;}
.elist{list-style:none;margin:6px 0;}
.elist li{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--bg);border-radius:9px;margin-bottom:5px;font-size:13px;}
.rm{background:none;border:none;color:var(--cr);cursor:pointer;font-size:16px;padding:0 4px;}
.arow{display:flex;gap:6px;margin-top:6px;}
.arow .fi{flex:1;}
.abtn{padding:9px 14px;background:#1a202c;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif;white-space:nowrap;}
.dbox{background:var(--cr-bg);border:1.5px solid var(--cr-bd);border-radius:14px;padding:18px;text-align:center;}
.dbox p{font-size:14px;color:var(--cr);margin-bottom:14px;line-height:1.6;font-weight:600;}
.dbtns{display:flex;gap:8px;}
.cbtn{flex:1;padding:12px;border-radius:11px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none;}
.cbtn.yes{background:var(--cr);color:#fff;}
.cbtn.no{background:#fff;color:var(--text);border:1.5px solid var(--border);}
.wmi{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;background:var(--bg);border-radius:11px;margin-bottom:6px;border:1px solid var(--border);}
.wmi-n{font-size:14px;font-weight:700;}
.wmi-c{font-size:11px;color:var(--muted);margin-top:2px;}
.wmi-b{display:flex;gap:6px;}
.wmb{background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:5px 10px;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
.wmb.del{color:var(--cr);border-color:var(--cr-bd);}
.div{border:none;border-top:1px solid var(--border);margin:16px 0;}
.toast{position:fixed;bottom:calc(var(--safe-bot)+84px);left:50%;transform:translateX(-50%) translateY(16px);background:#1a202c;color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:700;z-index:500;opacity:0;transition:all .25s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 1.4s infinite;display:inline-block;margin-left:3px;}

.calc-box{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;}
.calc-res{background:#fff;border:1.5px dashed var(--st-bd);padding:10px;border-radius:8px;margin-top:10px;font-size:14px;font-weight:700;color:var(--st);text-align:center;}

@media print {
  body, .scroll{overflow:visible !important;background:#fff !important;color:#000 !important;padding:0 !important;}
  .topbar, .stats-row, .search-wrap, .fab, .pfoot, .wedit, .login{display:none !important;}
  .pcard{box-shadow:none !important;border:1px solid #000 !important;page-break-inside:avoid;margin-bottom:15px !important;}
  .pdiag{background:#eee !important;border:1.5px solid #000 !important;}
}
</style>
</head>
<body>
<div class="login" id="LS">
  <div class="login-logo">🏥</div>
  <div class="login-title">لوحة المرضى</div>
  <div class="login-sub">سجّل دخولك — كل تعديل يُحفظ باسمك</div>
  <div class="lcard">
    <label class="lbl">الاسم الكامل</label>
    <input class="linput" id="lN" placeholder="د. علي زهير" type="text">
    <label class="lbl">التخصص / الدور</label>
    <input class="linput" id="lR" placeholder="طبيب مقيم — طوارئ" type="text">
    <button class="lbtn" onclick="doLogin()">دخول</button>
  </div>
</div>
<div class="topbar" id="TB" style="display:none">
  <div class="trow">
    <div class="app-title">🏥 لوحة المرضى</div>
    <div class="tright">
      <div class="clock" id="CL"></div>
      <div class="upill" onclick="logout()">👤 <span id="UN"></span></div>
    </div>
  </div>
  <div class="ward-tabs" id="WT"></div>
</div>
<div class="stats-row" id="SR" style="display:none"></div>
<div class="search-wrap" id="SW" style="display:none">
  <div class="sbox"><span>🔍</span><input type="text" id="SI" placeholder="بحث باسم المريض أو التشخيص..." oninput="renderBoard()"></div>
</div>
<div class="scroll" id="SC" style="display:none"></div>
<button class="fab" id="FB" onclick="openModal('addPatient')" style="display:none">＋ إضافة مريض</button>
<div class="overlay" id="OV" onclick="ovc(event)"><div class="modal" id="MD"></div></div>
<div class="toast" id="TS"></div>
<script>
const SU='https://mcuggyiudkcnqtpxnnyj.supabase.co';
const SK='sb_publishable_rqLOSR8WRKtCSYUoHQmxpA_IjDfZagz';
const SH={'Content-Type':'application/json','apikey':SK,'Authorization':'Bearer '+SK,'Prefer':'return=representation'};
async function sb(m,t,d,q=''){
  const r=await fetch(SU+'/rest/v1/'+t+q,{method:m,headers:SH,body:d?JSON.stringify(d):undefined});
  const tx=await r.text();return tx?JSON.parse(tx):[];
}
let user=JSON.parse(localStorage.getItem('icu_user')||'null');
let wards=[],patients=[],CW=null,CV='board',MA=null,MT=null;
const SL={critical:'حرج',watch:'مراقبة',stable:'مستقر','new-patient':'جديد'};
const SO={critical:0,watch:1,'new-patient':2,stable:3};
const AL={add_patient:'إضافة مريض',edit_patient:'تعديل مريض',discharge:'تخريج',add_symptom:'إضافة عرض',remove_symptom:'حذف عرض',add_rec:'إضافة توصية',remove_rec:'حذف توصية',add_ward:'إضافة ردهة',edit_ward:'تعديل ردهة',delete_ward:'حذف ردهة'};
function doLogin(){
  const n=document.getElementById('lN').value.trim();
  if(!n){alert('الاسم مطلوب');return;}
  user={name:n,role:document.getElementById('lR').value.trim()};
  localStorage.setItem('icu_user',JSON.stringify(user));showApp();
}
function logout(){if(confirm('تسجيل الخروج؟')){localStorage.removeItem('icu_user');location.reload();}}
function showApp(){
  document.getElementById('LS').style.display='none';
  ['TB','SR','SW','SC','FB'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.style.display=id==='TB'?'block':id==='SR'||id==='SW'?'flex':'block';
  });
  document.getElementById('UN').textContent=user.name;
  tick();setInterval(tick,30000);loadData();
}
function tick(){
  const n=new Date();
  document.getElementById('CL').innerHTML=n.toLocaleTimeString('ar-IQ',{hour:'2-digit',minute:'2-digit'})+'<br>'+n.toLocaleDateString('ar-IQ');
}
async function log(action,details,wid){
  try{await sb('POST','audit_log',{user_name:user.name,user_role:user.role||'',action,details,ward_id:wid||CW||null});}
  catch(e){}
}
async function loadData(){
  showLoading();
  try{
    wards=await sb('GET','wards',null,'?order=created_at.asc');
    patients=await sb('GET','patients',null,'?order=created_at.asc');
    if(!wards.length)await seedDefaults();
    if(!CW&&wards.length)CW=wards[0].id;
    renderAll();
  }catch(e){document.getElementById('SC').innerHTML='<div class="empty"><div class="ei">⚠️</div><p>خطأ في الاتصال</p></div>';}
}
async function seedDefaults(){
  const w1=await sb('POST','wards',{id:uid(),name:'ردهة الإنعاش',icon:'🫁'});
  const w2=await sb('POST','wards',{id:uid(),name:'الردهة العامة',icon:'🏥'});
  wards=[w1[0],w2[0]];
}
function showLoading(){document.getElementById('SC').innerHTML='<div class="empty"><div class="spinner"></div><p>جاري التحميل...</p></div>';}
function uid(){return '_'+Math.random().toString(36).slice(2,9);}
function renderAll(){renderTabs();renderStats();if(CV==='board')renderBoard();else if(CV==='audit')renderAuditPage();else if(CV==='calcs')renderCalcsPage();else if(CV==='archive')renderArchivePage();}
function renderTabs(){
  let h='';
  wards.forEach(w=>{
    const c=patients.filter(p=>p.ward_id===w.id && !p.is_archived).length;
    h+=`<button class="wtab${w.id===CW&&CV==='board'?' active':''}" onclick="sw2('${w.id}')">${w.icon} ${w.name}<span class="wcount">${c}</span></button>`;
  });
  h+=`<button class="wtab${CV==='archive'?' active':''}" onclick="switchArchive()">🗄️ الأرشيف</button>`;
  h+=`<button class="wtab${CV==='calcs'?' active':''}" onclick="switchCalcs()">🧮 الحاسبة</button>`;
  h+=`<button class="wtab${CV==='audit'?' active':''}" onclick="switchAudit()">📋 السجل</button>`;
  h+=`<button class="wtab-add" onclick="openModal('manageWards')">⚙️</button>`;
  document.getElementById('WT').innerHTML=h;
}
function sw2(id){CW=id;CV='board';document.getElementById('SI').value='';document.getElementById('SW').style.display='flex';document.getElementById('FB').style.display='flex';renderAll();}
function switchAudit(){CV='audit';document.getElementById('SW').style.display='none';document.getElementById('FB').style.display='none';renderAll();}
function switchCalcs(){CV='calcs';document.getElementById('SW').style.display='none';document.getElementById('FB').style.display='none';renderAll();}
function switchArchive(){CV='archive';document.getElementById('SW').style.display='flex';document.getElementById('FB').style.display='none';renderAll();}
function renderStats(){
  if(CV==='calcs' || CV==='audit'){document.getElementById('SR').style.display='none';return;}
  document.getElementById('SR').style.display='flex';
  const pts=CV==='archive'?patients.filter(p=>p.is_archived):patients.filter(p=>p.ward_id===CW && !p.is_archived);
  const c={critical:0,watch:0,stable:0,'new-patient':0};
  pts.forEach(p=>{if(c[p.status]!==undefined)c[p.status]++;});
  document.getElementById('SR').innerHTML=`
    <div class="scard cr"><div class="snum">${c.critical}</div><div class="slbl">حرج</div></div>
    <div class="scard wa"><div class="snum">${c.watch}</div><div class="slbl">مراقبة</div></div>
    <div class="scard nw"><div class="snum">${c['new-patient']}</div><div class="slbl">جديد</div></div>
    <div class="scard st"><div class="snum">${c.stable}</div><div class="slbl">مستقر</div></div>

function calcInfusion(){
  const wt=parseFloat(document.getElementById('c_wt').value)||0,dose=parseFloat(document.getElementById('c_dose').value)||0;
  const mg=parseFloat(document.getElementById('c_mg').value)||0,vol=parseFloat(document.getElementById('c_vol').value)||0;
  if(!wt||!dose||!mg||!vol){alert('يرجى إدخال قيم صحيحة');return;}
  const req_mcg_per_min = dose * wt;const concentration_mcg_per_ml = (mg * 1000) / vol;
  const rate = (req_mcg_per_min * 60) / concentration_mcg_per_ml;
  document.getElementById('infusion_res').innerHTML = `⚙️ سرعة ضخ الجهاز المطلوبة: <span style="font-size:18px">${rate.toFixed(2)} ml/hr</span>`;
}
function calcGFR(){
  const sex=document.getElementById('c_sex').value,age=parseFloat(document.getElementById('c_age').value)||0;
  const wt=parseFloat(document.getElementById('c_weight_gfr').value)||0,creat=parseFloat(document.getElementById('c_creat').value)||0;
  if(!age||!wt||!creat){alert('يرجى إدخال جميع الحقول');return;}
  let crcl = ((140 - age) * wt) / (72 * creat);if(sex==='f') crcl *= 0.85;
  let stage = 'Normal (>90)';if(crcl < 15) stage = 'Kidney Failure (Stage 5)';else if(crcl < 30) stage = 'Severe Decreased (Stage 4)';else if(crcl < 60) stage = 'Moderate Decreased (Stage 3)';else if(crcl < 90) stage = 'Mild Decreased (Stage 2)';
  document.getElementById('gfr_res').innerHTML = `📈 تصفية الكرياتينين المقدرة: <span style="font-size:18px">${crcl.toFixed(1)} ml/min</span><br><span style="font-size:11px;color:var(--muted)">التصنيف: ${stage}</span>`;
}

    txt+=`   • التشخيص: ${p.diagnosis||'—'}\n`;
    let devs=[];
    if(p.device_mv) devs.push('Ventilator');if(p.device_ng) devs.push('NG-Tube');if(p.device_tr) devs.push('Tracheostomy');if(p.device_nor) devs.push('Noradrenaline');
    if(devs.length) txt+=`   • الأجهزة: [${devs.join(' - ')}]\n`;
    if(p.follow_up_alert && p.follow_up_alert!=='none') txt+=`   • المراقبة: ⏱️ ${p.follow_up_alert}\n`;
    if(p.symptoms?.length) txt+=`   • الأعراض: ${p.symptoms.join('، ')}\n`;
    if(p.recommendations?.length) txt+=`   • التوصيات: ${p.recommendations.map(r=>'⚡ '+r).join(' \n')}\n`;
    txt+=`──────────────────\n`;
  });
  navigator.clipboard.writeText(txt).then(()=>{
    closeModal();toast('📋 تم نسخ الموقف الطبي النصي للجروب!');
  }).catch(()=>{alert('فشل النسخ التلقائي، يرجى المحاولة مرة أخرى');});
}
function shareAsPrint(wid){closeModal();window.print();}
function toast(m){const t=document.getElementById('TS');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
async function doAdd(){
  const n=document.getElementById('fn').value.trim(),d=document.getElementById('fd').value.trim();
  if(!n||!d){alert('الاسم والتشخيص مطلوبان');return;}
  const wid=document.getElementById('fw').value;
  const data={id:uid(),ward_id:wid,name:n,age:parseInt(document.getElementById('fa').value)||0,bed:document.getElementById('fb').value.trim()||'—',status:document.getElementById('fs').value,admit_date:new Date().toISOString().split('T')[0],diagnosis:d,tags:document.getElementById('ft').value.split(',').map(t=>t.trim()).filter(Boolean),symptoms:document.getElementById('fsy').value.split('\n').map(s=>s.trim()).filter(Boolean),recommendations:document.getElementById('frc').value.split('\n').map(r=>r.trim()).filter(Boolean),device_mv:document.getElementById('dmv').checked,device_ng:document.getElementById('dng').checked,device_tr:document.getElementById('dtr').checked,device_nor:document.getElementById('dnor').checked,follow_up_alert:document.getElementById('ffa').value,is_archived:false};
  try{const r=await sb('POST','patients',data);patients.push(r[0]);CW=wid;await log('add_patient','أضاف المريض: '+n+' — '+d,wid);closeModal();renderAll();toast('✅ تمت الإضافة للوحة');}catch(e){alert(e.message);}
}
async function doEdit(id){
  const n=document.getElementById('en').value.trim(),wid=document.getElementById('ew').value;
  const data={name:n,age:parseInt(document.getElementById('ea').value)||0,bed:document.getElementById('eb').value.trim(),ward_id:wid,diagnosis:document.getElementById('ed').value.trim(),status:document.getElementById('es').value,tags:document.getElementById('et').value.split(',').map(t=>t.trim()).filter(Boolean),device_mv:document.getElementById('emv').checked,device_ng:document.getElementById('eng').checked,device_tr:document.getElementById('etr').checked,device_nor:document.getElementById('enor').checked,follow_up_alert:document.getElementById('efa').value};
  try{await sb('PATCH','patients',data,'?id=eq.'+id);const i=patients.findIndex(x=>x.id===id);patients[i]={...patients[i],...data};CW=wid;await log('edit_patient','عدّل بيانات المريض: '+n,wid);closeModal();renderAll();toast('💾 تم الحفظ بنجاح');}catch(e){alert(e.message);}
}
async function rmItem(type,pid,idx){
  const p=patients.find(x=>x.id===pid),f=type==='symptoms'?'symptoms':'recommendations',rm=p[f][idx];
  p[f].splice(idx,1);
  try{await sb('PATCH','patients',{[f]:p[f]},'?id=eq.'+pid);await log(type==='symptoms'?'remove_symptom':'remove_rec',p.name+': حذف "'+rm+'"',p.ward_id);openModal(type==='symptoms'?'editSymptoms':'editRecs',pid);renderBoard();}catch(e){alert(e.message);}
}
async function addIt(type,pid){
  const v=document.getElementById(type==='symptoms'?'ns':'nr')?.value.trim();if(!v)return;
  const p=patients.find(x=>x.id===pid),f=type==='symptoms'?'symptoms':'recommendations';
  p[f]=[...p[f],v];
  try{await sb('PATCH','patients',{[f]:p[f]},'?id=eq.'+pid);await log(type==='symptoms'?'add_symptom':'add_rec',p.name+': أضاف "'+v+'"',p.ward_id);openModal(type==='symptoms'?'editSymptoms':'editRecs',pid);renderBoard();}catch(e){alert(e.message);}
}
async function doDis(id,n){
  const p=patients.find(x=>x.id===id);
  try{
    await sb('PATCH','patients',{is_archived:true},'?id=eq.'+id);
    p.is_archived=true;
    await log('discharge','خرّج المريض للأرشيف: '+n,p.ward_id);
    closeModal();renderAll();toast('🏠 تم التخريج ونقل المريض للأرشيف');
  }catch(e){alert(e.message);}
}
async function doAddW(){
  const n=document.getElementById('nwn').value.trim(),ic=document.getElementById('nwi').value.trim()||'🏥';
  if(!n){alert('اسم الردهة مطلوب');return;}
  try{const r=await sb('POST','wards',{id:uid(),name:n,icon:ic});wards.push(r[0]);CW=r[0].id;await log('add_ward','أضاف ردهة جديدة: '+ic+' '+n,r[0].id);closeModal();renderAll();toast('✅ تمت إضافة الردهة');}catch(e){alert(e.message);}
}
async function doEditW(id,old){
  const n=document.getElementById('ewn').value.trim(),ic=document.getElementById('ewi').value.trim();
  try{await sb('PATCH','wards',{name:n,icon:ic},'?id=eq.'+id);const w=wards.find(x=>x.id===id);w.name=n;w.icon=ic;await log('edit_ward','عدّل الردهة: '+old+' → '+ic+' '+n,id);closeModal();renderAll();toast('💾 تم الحفظ');}catch(e){alert(e.message);}
}
async function doDel(id,n){
  if(!confirm('هل تريد حذف "'+n+'" بشكل نهائي؟'))return;
  try{await sb('DELETE','wards',null,'?id=eq.'+id);wards=wards.filter(x=>x.id!==id);patients=patients.filter(x=>x.ward_id!==id);if(CW===id)CW=wards[0]?.id||null;await log('delete_ward','حذف الردهة: '+n);closeModal();renderAll();toast('🗑️ تم الحذف');}catch(e){alert(e.message);}
}
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
if(user)showApp();
