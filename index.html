<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ICU Board">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>لوحة المرضى الاحترافية</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --critical:#dc2626; --critical-bg:#fff1f1; --critical-bd:#fca5a5;
  --watch:#d97706;    --watch-bg:#fffbeb;    --watch-bd:#fcd34d;
  --stable:#16a34a;   --stable-bg:#f0fdf4;   --stable-bd:#86efac;
  --new:#7c3aed;      --new-bg:#faf5ff;      --new-bd:#c4b5fd;
  --accent:#0f172a;   --mid:#1e293b;
  --btn:#1e40af;      --btn2:#1d4ed8;
  --bg:#f0f4f8;       --card:#ffffff;
  --text:#1e293b;     --muted:#64748b;       --border:#e2e8f0;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--text);direction:rtl;display:flex;flex-direction:column;}

/* LOGIN SCREEN */
.login-screen{
  position:fixed;inset:0;background:var(--accent);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:1000;padding:24px;
}
.login-logo{font-size:52px;margin-bottom:16px;}
.login-title{font-size:20px;font-weight:700;color:white;margin-bottom:6px;}
.login-sub{font-size:13px;color:#94a3b8;margin-bottom:32px;text-align:center;}
.login-card{background:#1e293b;border-radius:18px;padding:24px;width:100%;max-width:360px;}
.login-label{font-size:11px;font-weight:700;color:#94a3b8;margin-bottom:6px;display:block;}
.login-input{
  width:100%;padding:12px 14px;background:#0f172a;border:1.5px solid #334155;
  border-radius:10px;font-family:'IBM Plex Sans Arabic',sans-serif;
  font-size:14px;color:white;direction:rtl;outline:none;margin-bottom:16px;
}
.login-input:focus{border-color:#3b82f6;}
.login-btn{
  width:100%;padding:13px;background:#1e40af;color:white;border:none;
  border-radius:12px;font-family:'IBM Plex Sans Arabic',sans-serif;
  font-size:15px;font-weight:700;cursor:pointer;
}
.login-btn:active{background:#1d4ed8;}

/* HEADER */
.header{
  background:var(--accent);color:white;
  padding:calc(var(--safe-top) + 10px) 14px 10px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,.3);
}
.header-brand{display:flex;align-items:center;gap:9px;}
.header-icon{width:34px;height:34px;background:#1e40af;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.header-title{font-size:15px;font-weight:700;}
.header-sub{font-size:10px;color:#94a3b8;margin-top:1px;}
.header-left{display:flex;align-items:center;gap:8px;}
.header-time{font-size:11px;color:#94a3b8;text-align:left;line-height:1.5;}
.user-badge{
  background:#1e293b;border-radius:20px;padding:4px 10px;
  font-size:11px;font-weight:600;color:#94a3b8;
  display:flex;align-items:center;gap:5px;cursor:pointer;
}
.user-badge span{color:white;}

/* WARD TABS */
.ward-tabs-wrap{background:var(--mid);flex-shrink:0;overflow-x:auto;display:flex;align-items:stretch;border-bottom:1px solid #334155;scrollbar-width:none;}
.ward-tabs-wrap::-webkit-scrollbar{display:none;}
.ward-tab{
  font-family:'IBM Plex Sans Arabic',sans-serif;font-size:12px;font-weight:600;
  padding:10px 14px;background:none;border:none;color:#94a3b8;
  cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;
  transition:all .18s;flex-shrink:0;display:flex;align-items:center;gap:6px;
}
.ward-tab.active{color:white;border-bottom-color:#3b82f6;}
.ward-tab .tab-count{font-size:10px;font-weight:700;background:#334155;color:#94a3b8;padding:1px 6px;border-radius:10px;}
.ward-tab.active .tab-count{background:#1e40af;color:white;}
.ward-tab-add{font-family:'IBM Plex Sans Arabic',sans-serif;padding:10px 12px;background:none;border:none;color:#3b82f6;cursor:pointer;font-size:18px;flex-shrink:0;display:flex;align-items:center;}

/* STATS BAR */
.stats-bar{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;background:white;border-bottom:1px solid var(--border);flex-shrink:0;scrollbar-width:none;}
.stats-bar::-webkit-scrollbar{display:none;}
.stat-chip{display:flex;align-items:center;gap:4px;padding:4px 9px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;flex-shrink:0;}
.stat-chip.cr{background:var(--critical-bg);color:var(--critical);}
.stat-chip.wa{background:var(--watch-bg);color:var(--watch);}
.stat-chip.st{background:var(--stable-bg);color:var(--stable);}
.stat-chip.np{background:var(--new-bg);color:var(--new);}
.stat-chip.to{background:#f1f5f9;color:#475569;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.sdot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 1.4s infinite;}

/* SEARCH */
.search-wrap{padding:8px 12px;background:white;border-bottom:1px solid var(--border);flex-shrink:0;}
.search-input{width:100%;padding:8px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:13px;direction:rtl;outline:none;transition:border .2s;background:var(--bg);}
.search-input:focus{border-color:var(--btn);background:white;}

/* BOTTOM TABS */
.bottom-tabs{
  display:flex;background:var(--accent);
  border-top:1px solid #1e293b;
  padding-bottom:var(--safe-bot);flex-shrink:0;
}
.btab{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 4px 8px;background:none;border:none;
  font-family:'IBM Plex Sans Arabic',sans-serif;font-size:10px;
  color:#64748b;cursor:pointer;gap:4px;transition:color .15s;
}
.btab.active{color:#3b82f6;}
.btab-icon{font-size:20px;}

/* SCROLL AREA */
.scroll-area{flex:1;overflow-y:auto;padding:10px 12px 10px;}
.scroll-area::-webkit-scrollbar{width:3px;}
.scroll-area::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px;}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;color:var(--muted);}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--btn);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* WARD HEADER */
.ward-header-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:10px 12px;background:var(--card);border-radius:12px;border:1.5px solid var(--border);}
.ward-name-display{font-size:15px;font-weight:700;}
.ward-name-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.ward-edit-btn{background:#f1f5f9;border:none;border-radius:8px;padding:6px 11px;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:4px;}

/* PATIENT CARD */
.card{background:var(--card);border-radius:14px;margin-bottom:10px;border:1.5px solid var(--border);overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.04);transition:box-shadow .2s;}
.card.critical{border-color:var(--critical-bd);}
.card.watch{border-color:var(--watch-bd);}
.card.stable{border-color:var(--stable-bd);}
.card.new-patient{border-color:var(--new-bd);}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px 8px;border-bottom:1px solid var(--border);position:relative;}
.card-header::after{content:'';position:absolute;right:0;top:0;bottom:0;width:4px;border-radius:0 4px 4px 0;}
.card.critical .card-header::after{background:var(--critical);}
.card.watch    .card-header::after{background:var(--watch);}
.card.stable   .card-header::after{background:var(--stable);}
.card.new-patient .card-header::after{background:var(--new);}
.patient-name{font-size:14px;font-weight:700;}
.patient-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.status-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;display:flex;align-items:center;gap:4px;flex-shrink:0;}
.status-badge.critical{background:var(--critical-bg);color:var(--critical);}
.status-badge.watch{background:var(--watch-bg);color:var(--watch);}
.status-badge.stable{background:var(--stable-bg);color:var(--stable);}
.status-badge.new-patient{background:var(--new-bg);color:var(--new);}
.card-body{padding:10px 12px;}
.diag-line{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;}
.tags-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px;background:#f1f5f9;color:var(--muted);border:1px solid var(--border);}
.sec-title{font-size:10px;font-weight:700;color:var(--muted);margin:8px 0 4px;}
.items-ul{list-style:none;}
.items-ul li{font-size:12px;padding:3px 0;border-bottom:1px solid #f8fafc;display:flex;align-items:flex-start;gap:5px;}
.items-ul.sym li::before{content:'•';color:var(--critical);font-weight:700;flex-shrink:0;}
.items-ul.rec li::before{content:'→';color:var(--btn);font-weight:700;flex-shrink:0;}
.card-actions{display:flex;gap:5px;padding:8px 10px;border-top:1px solid var(--border);background:#fafbfc;flex-wrap:wrap;}
.act-btn{font-family:'IBM Plex Sans Arabic',sans-serif;font-size:11px;font-weight:600;padding:5px 9px;border-radius:8px;border:1.5px solid var(--border);background:white;color:var(--text);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:3px;}
.act-btn:active{transform:scale(.96);}
.act-btn.pr{color:var(--btn);border-color:#bfdbfe;}
.act-btn.su{color:var(--stable);border-color:var(--stable-bd);}
.act-btn.da{color:var(--critical);border-color:var(--critical-bd);}

/* FAB */
.fab{position:fixed;bottom:calc(var(--safe-bot) + 62px);left:16px;background:var(--btn);color:white;border:none;border-radius:50px;padding:13px 20px;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(30,64,175,.45);z-index:100;display:flex;align-items:center;gap:7px;}
.fab:active{transform:scale(.96);}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-icon{font-size:40px;margin-bottom:10px;}
.empty p{font-size:13px;}

/* AUDIT LOG */
.audit-item{background:var(--card);border-radius:12px;padding:12px;margin-bottom:8px;border:1.5px solid var(--border);}
.audit-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.audit-user{font-size:12px;font-weight:700;color:var(--btn);display:flex;align-items:center;gap:5px;}
.audit-time{font-size:10px;color:var(--muted);}
.audit-action{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;background:#f1f5f9;color:var(--muted);margin-bottom:5px;display:inline-block;}
.audit-details{font-size:12px;color:var(--text);line-height:1.5;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:white;border-radius:22px 22px 0 0;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding:20px 16px calc(var(--safe-bot) + 28px);transform:translateY(40px);transition:transform .25s;}
.overlay.open .modal{transform:translateY(0);}
.modal::-webkit-scrollbar{display:none;}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-title{font-size:15px;font-weight:700;}
.modal-close{background:#f1f5f9;border:none;border-radius:50%;width:30px;height:30px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);}
.fg{margin-bottom:11px;}
.fl{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px;display:block;}
.fi,.fsel,.fta{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:13px;direction:rtl;outline:none;transition:border .2s;background:var(--bg);color:var(--text);}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--btn);background:white;}
.fta{resize:vertical;min-height:68px;}
.sbtn{width:100%;padding:12px;background:var(--btn);color:white;border:none;border-radius:12px;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;}
.sbtn:active{background:var(--btn2);}
.sbtn.red{background:var(--critical);}
.edit-list{list-style:none;margin:6px 0;}
.edit-list li{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;background:var(--bg);border-radius:7px;margin-bottom:4px;font-size:12px;}
.rm-btn{background:none;border:none;color:var(--critical);cursor:pointer;font-size:15px;padding:0 4px;line-height:1;}
.add-row{display:flex;gap:6px;margin-top:4px;}
.add-row .fi{flex:1;}
.add-row .add-btn{padding:8px 12px;background:var(--btn);color:white;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'IBM Plex Sans Arabic',sans-serif;white-space:nowrap;}
.dis-box{background:var(--critical-bg);border:1.5px solid var(--critical-bd);border-radius:12px;padding:16px;text-align:center;}
.dis-box p{font-size:13px;color:var(--critical);margin-bottom:14px;line-height:1.6;}
.dis-btns{display:flex;gap:8px;}
.cbtn{flex:1;padding:11px;border-radius:10px;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;}
.cbtn.yes{background:var(--critical);color:white;}
.cbtn.no{background:white;color:var(--text);border:1.5px solid var(--border);}
.wm-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg);border-radius:10px;margin-bottom:6px;border:1.5px solid var(--border);}
.wm-item-info{flex:1;}
.wm-name{font-size:13px;font-weight:700;}
.wm-count{font-size:11px;color:var(--muted);margin-top:2px;}
.wm-btns{display:flex;gap:6px;}
.wm-btn{background:white;border:1.5px solid var(--border);border-radius:7px;padding:5px 9px;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:11px;font-weight:600;cursor:pointer;color:var(--text);}
.wm-btn.del{color:var(--critical);border-color:var(--critical-bd);}
.divider{border:none;border-top:1.5px solid var(--border);margin:14px 0;}
.toast{position:fixed;bottom:calc(var(--safe-bot) + 70px);left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;color:white;padding:10px 18px;border-radius:20px;font-size:12px;font-weight:600;z-index:500;opacity:0;transition:all .3s;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-logo">🏥</div>
  <div class="login-title">لوحة المرضى الاحترافية</div>
  <div class="login-sub">سجّل دخولك — كل تعديل يُسجَّل باسمك</div>
  <div class="login-card">
    <label class="login-label">اسمك الكامل</label>
    <input class="login-input" id="loginName" placeholder="د. علي زهير" type="text">
    <label class="login-label">تخصصك / دورك</label>
    <input class="login-input" id="loginRole" placeholder="طبيب مقيم — طوارئ" type="text">
    <button class="login-btn" onclick="doLogin()">دخول ←</button>
  </div>
</div>

<!-- HEADER -->
<div class="header" id="mainHeader" style="display:none">
  <div class="header-brand">
    <div class="header-icon">🏥</div>
    <div>
      <div class="header-title">لوحة المرضى</div>
      <div class="header-sub" id="hSub">—</div>
    </div>
  </div>
  <div class="header-left">
    <div class="header-time" id="hTime"></div>
    <div class="user-badge" onclick="logout()">👤 <span id="userNameBadge"></span></div>
  </div>
</div>

<!-- WARD TABS -->
<div class="ward-tabs-wrap" id="wardTabs" style="display:none"></div>

<!-- STATS BAR -->
<div class="stats-bar" id="statsBar" style="display:none"></div>

<!-- SEARCH -->
<div class="search-wrap" id="searchWrap" style="display:none">
  <input class="search-input" type="text" placeholder="🔍  بحث عن مريض..." id="searchInput" oninput="renderBoard()">
</div>

<!-- SCROLL AREA -->
<div class="scroll-area" id="scrollArea" style="display:none"></div>

<!-- BOTTOM TABS -->
<div class="bottom-tabs" id="bottomTabs" style="display:none">
  <button class="btab active" id="tab-board" onclick="switchTab('board')">
    <span class="btab-icon">🏥</span>المرضى
  </button>
  <button class="btab" id="tab-audit" onclick="switchTab('audit')">
    <span class="btab-icon">📋</span>سجل التعديلات
  </button>
</div>

<!-- FAB -->
<button class="fab" id="fabBtn" onclick="openModal('addPatient')" style="display:none">➕ إضافة مريض</button>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal" id="modal"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════
// SUPABASE CONFIG
// ══════════════════════════════════════
const SUPABASE_URL = 'https://mcuggyiudkcnqtpxnnyj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_rqLOSR8WRKtCSYUoHQmxpA_IjDfZagz';

const headers = {
  'Content-Type': 'application/json',
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Prefer': 'return=representation'
};

async function sb(method, table, data=null, query=''){
  const url = `${SUPABASE_URL}/rest/v1/${table}${query}`;
  const opts = { method, headers };
  if(data) opts.body = JSON.stringify(data);
  const res = await fetch(url, opts);
  if(!res.ok){ const err=await res.text(); throw new Error(err); }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let currentUser = JSON.parse(localStorage.getItem('icu_user') || 'null');
let currentWard = null;
let wards = [];
let patients = [];
let currentTab = 'board';
let modalAction = null, modalTarget = null;

const statusLabel = {critical:'حرج',watch:'مراقبة',stable:'مستقر','new-patient':'جديد'};
const statusOrder = {critical:0,watch:1,'new-patient':2,stable:3};
const actionLabel = {
  'add_patient':'إضافة مريض','edit_patient':'تعديل مريض',
  'discharge':'تخريج مريض','add_symptom':'إضافة عرض',
  'remove_symptom':'حذف عرض','add_rec':'إضافة توصية',
  'remove_rec':'حذف توصية','add_ward':'إضافة ردهة',
  'edit_ward':'تعديل ردهة','delete_ward':'حذف ردهة'
};

// ══════════════════════════════════════
// LOGIN
// ══════════════════════════════════════
function doLogin(){
  const name = document.getElementById('loginName').value.trim();
  const role = document.getElementById('loginRole').value.trim();
  if(!name){ alert('الاسم مطلوب'); return; }
  currentUser = { name, role };
  localStorage.setItem('icu_user', JSON.stringify(currentUser));
  showApp();
}

function logout(){
  if(!confirm('تريد تسجيل الخروج؟')) return;
  localStorage.removeItem('icu_user');
  currentUser = null;
  location.reload();
}

function showApp(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainHeader').style.display = 'flex';
  document.getElementById('wardTabs').style.display = 'flex';
  document.getElementById('statsBar').style.display = 'flex';
  document.getElementById('searchWrap').style.display = 'block';
  document.getElementById('scrollArea').style.display = 'block';
  document.getElementById('bottomTabs').style.display = 'flex';
  document.getElementById('fabBtn').style.display = 'flex';
  document.getElementById('userNameBadge').textContent = currentUser.name;
  tick(); setInterval(tick, 30000);
  loadData();
}

// ══════════════════════════════════════
// AUDIT LOG
// ══════════════════════════════════════
async function log(action, details){
  try {
    await sb('POST', 'audit_log', {
      user_name: currentUser.name,
      action, details
    });
  } catch(e){ console.warn('audit log failed', e); }
}

// ══════════════════════════════════════
// DATA LOADING
// ══════════════════════════════════════
async function loadData(){
  showLoading();
  try {
    wards = await sb('GET', 'wards', null, '?order=created_at.asc');
    patients = await sb('GET', 'patients', null, '?order=created_at.asc');
    if(wards.length === 0) await seedDefaults();
    if(!currentWard && wards.length) currentWard = wards[0].id;
    renderAll();
  } catch(e){
    document.getElementById('scrollArea').innerHTML =
      `<div class="empty"><div class="empty-icon">⚠️</div><p>خطأ في الاتصال<br>${e.message}</p></div>`;
  }
}

async function seedDefaults(){
  const w1 = await sb('POST','wards',{id:uid(),name:'ردهة الإنعاش',icon:'🫁'});
  const w2 = await sb('POST','wards',{id:uid(),name:'الردهة العامة',icon:'🏥'});
  wards = [w1[0], w2[0]];
}

function showLoading(){
  document.getElementById('scrollArea').innerHTML =
    `<div class="loading"><div class="spinner"></div><p>جاري التحميل...</p></div>`;
}

function uid(){ return '_'+Math.random().toString(36).slice(2,9); }

// ══════════════════════════════════════
// CLOCK
// ══════════════════════════════════════
function tick(){
  const n=new Date();
  document.getElementById('hTime').innerHTML=
    n.toLocaleTimeString('ar-IQ',{hour:'2-digit',minute:'2-digit'})+'<br>'+
    n.toLocaleDateString('ar-IQ');
}

// ══════════════════════════════════════
// TABS
// ══════════════════════════════════════
function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.btab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('searchWrap').style.display = tab==='board'?'block':'none';
  document.getElementById('wardTabs').style.display = tab==='board'?'flex':'none';
  document.getElementById('statsBar').style.display = tab==='board'?'flex':'none';
  document.getElementById('fabBtn').style.display = tab==='board'?'flex':'none';
  if(tab==='board') renderAll();
  else renderAudit();
}

// ══════════════════════════════════════
// RENDER ALL
// ══════════════════════════════════════
function renderAll(){
  renderTabs(); renderStats(); renderBoard();
}

function renderTabs(){
  const wrap = document.getElementById('wardTabs');
  let html = '';
  wards.forEach(w=>{
    const cnt = patients.filter(p=>p.ward_id===w.id).length;
    const active = w.id===currentWard ? 'active' : '';
    html+=`<button class="ward-tab ${active}" onclick="switchWard('${w.id}')">
      <span>${w.icon}</span><span>${w.name}</span>
      <span class="tab-count">${cnt}</span>
    </button>`;
  });
  html+=`<button class="ward-tab-add" onclick="openModal('manageWards')">⚙️</button>`;
  wrap.innerHTML = html;
}

function switchWard(id){
  currentWard = id;
  document.getElementById('searchInput').value = '';
  renderAll();
}

function renderStats(){
  const pts = patients.filter(p=>p.ward_id===currentWard);
  const c = {critical:0,watch:0,stable:0,'new-patient':0};
  pts.forEach(p=>{ if(c[p.status]!==undefined) c[p.status]++; });
  document.getElementById('statsBar').innerHTML=`
    <span class="stat-chip cr"><span class="sdot"></span>حرج: ${c.critical}</span>
    <span class="stat-chip wa"><span class="sdot"></span>مراقبة: ${c.watch}</span>
    <span class="stat-chip np"><span class="sdot"></span>جديد: ${c['new-patient']}</span>
    <span class="stat-chip st"><span class="sdot"></span>مستقر: ${c.stable}</span>
    <span class="stat-chip to">المجموع: ${pts.length}</span>`;
  const ward = wards.find(w=>w.id===currentWard);
  document.getElementById('hSub').textContent = ward ? ward.name : '—';
}

function renderBoard(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const ward = wards.find(w=>w.id===currentWard);
  const area = document.getElementById('scrollArea');
  if(!ward){
    area.innerHTML=`<div class="empty"><div class="empty-icon">🏥</div><p>لا توجد ردهات<br>اضغط ⚙️ لإضافة ردهة</p></div>`;
    return;
  }
  let pts = patients.filter(p=>p.ward_id===currentWard);
  if(q) pts = pts.filter(p=>
    p.name?.includes(q)||p.diagnosis?.includes(q)||p.bed?.includes(q)||
    p.tags?.some(t=>t.includes(q))
  );
  pts.sort((a,b)=>(statusOrder[a.status]??9)-(statusOrder[b.status]??9));

  const cnt = patients.filter(p=>p.ward_id===currentWard).length;
  let html=`
  <div class="ward-header-bar">
    <div>
      <div class="ward-name-display">${ward.icon} ${ward.name}</div>
      <div class="ward-name-sub">${cnt} مريض — ${new Date().toLocaleDateString('ar-IQ')}</div>
    </div>
    <button class="ward-edit-btn" onclick="openModal('editWard','${ward.id}')">✏️ تعديل</button>
  </div>`;

  if(!pts.length){
    html+=`<div class="empty"><div class="empty-icon">${q?'🔍':'🛏️'}</div><p>${q?'لا توجد نتائج':'لا يوجد مرضى في هذه الردهة'}</p></div>`;
    area.innerHTML=html; return;
  }

  pts.forEach(p=>{
    const admit = p.admit_date ? new Date(p.admit_date).toLocaleDateString('ar-IQ') : '—';
    const tags = (p.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
    const syms = (p.symptoms||[]).map(s=>`<li>${s}</li>`).join('');
    const recs = (p.recommendations||[]).map(r=>`<li>${r}</li>`).join('');
    html+=`
    <div class="card ${p.status}">
      <div class="card-header">
        <div>
          <div class="patient-name">${p.name}</div>
          <div class="patient-meta">${p.age} سنة · ${p.bed} · ${admit}</div>
        </div>
        <span class="status-badge ${p.status}"><span class="sdot"></span>${statusLabel[p.status]||p.status}</span>
      </div>
      <div class="card-body">
        <div class="diag-line">📋 ${p.diagnosis||'—'}</div>
        <div class="tags-row">${tags}</div>
        ${syms?`<div class="sec-title">⚠️ الأعراض والموجودات</div><ul class="items-ul sym">${syms}</ul>`:''}
        ${recs?`<div class="sec-title">📌 التوصيات</div><ul class="items-ul rec">${recs}</ul>`:''}
      </div>
      <div class="card-actions">
        <button class="act-btn pr" onclick="openModal('editSymptoms','${p.id}')">➕ أعراض</button>
        <button class="act-btn pr" onclick="openModal('editRecs','${p.id}')">➕ توصية</button>
        <button class="act-btn"    onclick="openModal('editPatient','${p.id}')">✏️ تعديل</button>
        <button class="act-btn su" onclick="openModal('discharge','${p.id}')">🏠 تخريج</button>
      </div>
    </div>`;
  });
  area.innerHTML = html;
}

// ══════════════════════════════════════
// AUDIT RENDER
// ══════════════════════════════════════
async function renderAudit(){
  const area = document.getElementById('scrollArea');
  area.innerHTML = `<div class="loading"><div class="spinner"></div><p>جاري التحميل...</p></div>`;
  try {
    const logs = await sb('GET','audit_log',null,'?order=created_at.desc&limit=100');
    if(!logs.length){
      area.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><p>لا توجد تعديلات بعد</p></div>`;
      return;
    }
    let html = '';
    logs.forEach(l=>{
      const dt = new Date(l.created_at);
      const timeStr = dt.toLocaleString('ar-IQ',{hour:'2-digit',minute:'2-digit',day:'numeric',month:'numeric'});
      const aLabel = actionLabel[l.action] || l.action;
      html+=`
      <div class="audit-item">
        <div class="audit-header">
          <div class="audit-user">👤 ${l.user_name}</div>
          <div class="audit-time">${timeStr}</div>
        </div>
        <span class="audit-action">${aLabel}</span>
        <div class="audit-details">${l.details||''}</div>
      </div>`;
    });
    area.innerHTML = html;
  } catch(e){
    area.innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><p>خطأ: ${e.message}</p></div>`;
  }
}

// ══════════════════════════════════════
// MODAL
// ══════════════════════════════════════
function openModal(action, target=null){
  modalAction=action; modalTarget=target;
  const modal=document.getElementById('modal');
  modal.innerHTML = buildModal(action,target);
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  modalAction=null; modalTarget=null;
}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeModal();}

function buildModal(action,target){
  const H=t=>`<div class="modal-head"><div class="modal-title">${t}</div><button class="modal-close" onclick="closeModal()">✕</button></div>`;
  const p = target ? patients.find(x=>x.id===target) : null;

  if(action==='addPatient'){
    const wardOpts = wards.map(w=>`<option value="${w.id}"${w.id===currentWard?' selected':''}>${w.icon} ${w.name}</option>`).join('');
    return H('➕ إضافة مريض جديد')+`
    <div class="fg"><label class="fl">الاسم الكامل</label><input class="fi" id="f_name" placeholder="اسم المريض"></div>
    <div class="fg"><label class="fl">العمر</label><input class="fi" type="number" id="f_age" placeholder="بالسنوات"></div>
    <div class="fg"><label class="fl">السرير / الغرفة</label><input class="fi" id="f_bed" placeholder="مثال: سرير 5"></div>
    <div class="fg"><label class="fl">الردهة</label><select class="fsel" id="f_ward">${wardOpts}</select></div>
    <div class="fg"><label class="fl">التشخيص</label><input class="fi" id="f_diag"></div>
    <div class="fg"><label class="fl">الحالة</label>
      <select class="fsel" id="f_status">
        <option value="new-patient">🟣 جديد</option>
        <option value="critical">🔴 حرج</option>
        <option value="watch">🟡 مراقبة</option>
        <option value="stable">🟢 مستقر</option>
      </select></div>
    <div class="fg"><label class="fl">الوسوم (مفصولة بفاصلة)</label><input class="fi" id="f_tags"></div>
    <div class="fg"><label class="fl">الأعراض (كل سطر = عرض)</label><textarea class="fta" id="f_syms"></textarea></div>
    <div class="fg"><label class="fl">التوصيات (كل سطر = توصية)</label><textarea class="fta" id="f_recs"></textarea></div>
    <button class="sbtn" onclick="doAddPatient()">✅ إضافة المريض</button>`;
  }

  if(action==='editPatient'){
    const wardOpts = wards.map(w=>`<option value="${w.id}"${w.id===p.ward_id?' selected':''}>${w.icon} ${w.name}</option>`).join('');
    return H(`✏️ تعديل — ${p.name}`)+`
    <div class="fg"><label class="fl">الاسم</label><input class="fi" id="e_name" value="${p.name}"></div>
    <div class="fg"><label class="fl">العمر</label><input class="fi" type="number" id="e_age" value="${p.age||''}"></div>
    <div class="fg"><label class="fl">السرير</label><input class="fi" id="e_bed" value="${p.bed||''}"></div>
    <div class="fg"><label class="fl">الردهة</label><select class="fsel" id="e_ward">${wardOpts}</select></div>
    <div class="fg"><label class="fl">التشخيص</label><input class="fi" id="e_diag" value="${p.diagnosis||''}"></div>
    <div class="fg"><label class="fl">الحالة</label>
      <select class="fsel" id="e_status">
        <option value="critical"${p.status==='critical'?' selected':''}>🔴 حرج</option>
        <option value="watch"${p.status==='watch'?' selected':''}>🟡 مراقبة</option>
        <option value="stable"${p.status==='stable'?' selected':''}>🟢 مستقر</option>
        <option value="new-patient"${p.status==='new-patient'?' selected':''}>🟣 جديد</option>
      </select></div>
    <div class="fg"><label class="fl">الوسوم (مفصولة بفاصلة)</label><input class="fi" id="e_tags" value="${(p.tags||[]).join(', ')}"></div>
    <button class="sbtn" onclick="doEditPatient('${p.id}')">💾 حفظ</button>`;
  }

  if(action==='editSymptoms'){
    const items=(p.symptoms||[]).map((s,i)=>`<li>${s}<button class="rm-btn" onclick="removeItem('symptoms','${p.id}',${i})">✕</button></li>`).join('');
    return H(`⚠️ أعراض — ${p.name}`)+`
    <ul class="edit-list">${items||'<li style="color:var(--muted);font-size:12px;">لا توجد أعراض</li>'}</ul>
    <div class="add-row"><input class="fi" id="new_sym" placeholder="عرض جديد..."><button class="add-btn" onclick="addItem('symptoms','${p.id}')">إضافة</button></div>`;
  }

  if(action==='editRecs'){
    const items=(p.recommendations||[]).map((r,i)=>`<li>${r}<button class="rm-btn" onclick="removeItem('recommendations','${p.id}',${i})">✕</button></li>`).join('');
    return H(`📌 توصيات — ${p.name}`)+`
    <ul class="edit-list">${items||'<li style="color:var(--muted);font-size:12px;">لا توجد توصيات</li>'}</ul>
    <div class="add-row"><input class="fi" id="new_rec" placeholder="توصية جديدة..."><button class="add-btn" onclick="addItem('recommendations','${p.id}')">إضافة</button></div>`;
  }

  if(action==='discharge'){
    return H('🏠 تخريج مريض')+`
    <div class="dis-box">
      <p>هل تريد تخريج<br><strong>${p.name}</strong>؟<br><span style="font-size:11px">سيُحذف نهائياً من اللوحة</span></p>
      <div class="dis-btns">
        <button class="cbtn yes" onclick="doDischarge('${p.id}','${p.name}')">✅ تخريج</button>
        <button class="cbtn no" onclick="closeModal()">إلغاء</button>
      </div>
    </div>`;
  }

  if(action==='manageWards'){
    const list = wards.map(w=>{
      const cnt = patients.filter(p=>p.ward_id===w.id).length;
      return `<div class="wm-item">
        <div class="wm-item-info"><div class="wm-name">${w.icon} ${w.name}</div><div class="wm-count">${cnt} مريض</div></div>
        <div class="wm-btns">
          <button class="wm-btn" onclick="openModal('editWard','${w.id}')">✏️</button>
          ${cnt===0?`<button class="wm-btn del" onclick="doDeleteWard('${w.id}','${w.name}')">🗑️</button>`:''}
        </div>
      </div>`;
    }).join('');
    return H('⚙️ إدارة الردهات')+`
    <div>${list}</div>
    <hr class="divider">
    <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:10px;">➕ إضافة ردهة جديدة</div>
    <div class="fg"><label class="fl">اسم الردهة</label><input class="fi" id="nw_name" placeholder="مثال: ردهة الجراحة"></div>
    <div class="fg"><label class="fl">الأيقونة</label><input class="fi" id="nw_icon" placeholder="🔬" style="font-size:18px"></div>
    <button class="sbtn" onclick="doAddWard()">➕ إضافة الردهة</button>`;
  }

  if(action==='editWard'){
    const w = wards.find(x=>x.id===target);
    const cnt = patients.filter(p=>p.ward_id===w.id).length;
    return H(`✏️ تعديل: ${w.name}`)+`
    <div class="fg"><label class="fl">اسم الردهة</label><input class="fi" id="ew_name" value="${w.name}"></div>
    <div class="fg"><label class="fl">الأيقونة</label><input class="fi" id="ew_icon" value="${w.icon}" style="font-size:18px"></div>
    <button class="sbtn" onclick="doEditWard('${w.id}','${w.name}')">💾 حفظ</button>
    <hr class="divider">
    ${cnt===0?`<button class="sbtn red" onclick="doDeleteWard('${w.id}','${w.name}')">🗑️ حذف هذه الردهة</button>`:'<p style="font-size:12px;color:var(--muted);text-align:center">لا يمكن حذف ردهة فيها مرضى</p>'}`;
  }
  return '';
}

// ══════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

async function doAddPatient(){
  const name=document.getElementById('f_name').value.trim();
  const diag=document.getElementById('f_diag').value.trim();
  if(!name||!diag){alert('الاسم والتشخيص مطلوبان');return;}
  const data = {
    id:uid(),
    ward_id:document.getElementById('f_ward').value,
    name, age:parseInt(document.getElementById('f_age').value)||0,
    bed:document.getElementById('f_bed').value.trim()||'—',
    status:document.getElementById('f_status').value,
    admit_date:new Date().toISOString().split('T')[0],
    diagnosis:diag,
    tags:document.getElementById('f_tags').value.split(',').map(t=>t.trim()).filter(Boolean),
    symptoms:document.getElementById('f_syms').value.split('\n').map(s=>s.trim()).filter(Boolean),
    recommendations:document.getElementById('f_recs').value.split('\n').map(r=>r.trim()).filter(Boolean),
  };
  try {
    const res = await sb('POST','patients',data);
    patients.push(res[0]);
    currentWard = data.ward_id;
    await log('add_patient',`أضاف المريض: ${name} — ${diag}`);
    closeModal(); renderAll(); showToast('✅ تمت إضافة المريض');
  } catch(e){ alert('خطأ: '+e.message); }
}

async function doEditPatient(id){
  const name=document.getElementById('e_name').value.trim();
  const wardId=document.getElementById('e_ward').value;
  const data = {
    name, age:parseInt(document.getElementById('e_age').value)||0,
    bed:document.getElementById('e_bed').value.trim(),
    ward_id:wardId,
    diagnosis:document.getElementById('e_diag').value.trim(),
    status:document.getElementById('e_status').value,
    tags:document.getElementById('e_tags').value.split(',').map(t=>t.trim()).filter(Boolean),
  };
  try {
    await sb('PATCH','patients',data,`?id=eq.${id}`);
    const i=patients.findIndex(x=>x.id===id);
    patients[i]={...patients[i],...data};
    currentWard=wardId;
    await log('edit_patient',`عدّل بيانات: ${name}`);
    closeModal(); renderAll(); showToast('💾 تم الحفظ');
  } catch(e){ alert('خطأ: '+e.message); }
}

async function removeItem(type,pid,idx){
  const p=patients.find(x=>x.id===pid);
  const field=type==='symptoms'?'symptoms':'recommendations';
  const removed=p[field][idx];
  p[field].splice(idx,1);
  try {
    await sb('PATCH','patients',{[field]:p[field]},`?id=eq.${pid}`);
    await log(type==='symptoms'?'remove_symptom':'remove_rec',`${p.name}: حذف "${removed}"`);
    openModal(type==='symptoms'?'editSymptoms':'editRecs',pid);
    renderBoard();
  } catch(e){ alert('خطأ: '+e.message); }
}

async function addItem(type,pid){
  const inputId=type==='symptoms'?'new_sym':'new_rec';
  const val=document.getElementById(inputId)?.value.trim();
  if(!val) return;
  const p=patients.find(x=>x.id===pid);
  const field=type==='symptoms'?'symptoms':'recommendations';
  p[field]=[...p[field],val];
  try {
    await sb('PATCH','patients',{[field]:p[field]},`?id=eq.${pid}`);
    await log(type==='symptoms'?'add_symptom':'add_rec',`${p.name}: أضاف "${val}"`);
    openModal(type==='symptoms'?'editSymptoms':'editRecs',pid);
    renderBoard();
  } catch(e){ alert('خطأ: '+e.message); }
}

async function doDischarge(id,name){
  try {
    await sb('DELETE','patients',null,`?id=eq.${id}`);
    patients=patients.filter(x=>x.id!==id);
    await log('discharge',`خرّج المريض: ${name}`);
    closeModal(); renderAll(); showToast('🏠 تم تخريج المريض');
  } catch(e){ alert('خطأ: '+e.message); }
}

async function doAddWard(){
  const name=document.getElementById('nw_name').value.trim();
  const icon=document.getElementById('nw_icon').value.trim()||'🏥';
  if(!name){alert('اسم الردهة مطلوب');return;}
  try {
    const res=await sb('POST','wards',{id:uid(),name,icon});
    wards.push(res[0]);
    currentWard=res[0].id;
    await log('add_ward',`أضاف ردهة: ${icon} ${name}`);
    closeModal(); renderAll(); showToast('✅ تمت إضافة الردهة');
  } catch(e){ alert('خطأ: '+e.message); }
}

async function doEditWard(id,oldName){
  const name=document.getElementById('ew_name').value.trim();
  const icon=document.getElementById('ew_icon').value.trim();
  try {
    await sb('PATCH','wards',{name,icon},`?id=eq.${id}`);
    const w=wards.find(x=>x.id===id);
    w.name=name; w.icon=icon;
    await log('edit_ward',`عدّل ردهة: ${oldName} → ${icon} ${name}`);
    closeModal(); renderAll(); showToast('💾 تم الحفظ');
  } catch(e){ alert('خطأ: '+e.message); }
}

async function doDeleteWard(id,name){
  if(!confirm(`حذف ردهة "${name}"؟`)) return;
  try {
    await sb('DELETE','wards',null,`?id=eq.${id}`);
    wards=wards.filter(x=>x.id!==id);
    if(currentWard===id) currentWard=wards[0]?.id||null;
    await log('delete_ward',`حذف ردهة: ${name}`);
    closeModal(); renderAll(); showToast('🗑️ تم الحذف');
  } catch(e){ alert('خطأ: '+e.message); }
}
